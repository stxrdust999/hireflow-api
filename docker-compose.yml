services:
  mysql:
    image: mysql:8.0
    container_name: hireflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - hireflow_mysql_data:/var/lib/mysql
    networks:
      - hireflow

  redis:
    image: redis:7-alpine
    container_name: hireflow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - hireflow_redis_data:/data
    networks:
      - hireflow

volumes:
  hireflow_mysql_data:
  hireflow_redis_data:

networks:
  hireflow:
    driver: bridge
